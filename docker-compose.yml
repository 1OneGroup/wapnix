services:
  wapnix:
    image: ghcr.io/1onegroup/wapnix:${IMAGE_TAG:-latest}
    container_name: wapnix
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-wapnix-default-secret-change-me-in-production}
    volumes:
      - wapnix-data:/app/backend/data
      - wapnix-uploads:/app/backend/uploads

volumes:
  wapnix-data:
  wapnix-uploads:
