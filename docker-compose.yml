version: "3.8"

services:
  wapnix:
    build: .
    container_name: wapnix
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=CHANGE_ME_TO_A_RANDOM_SECRET_STRING
    volumes:
      - wapnix-data:/app/backend/data
      - wapnix-uploads:/app/backend/uploads

volumes:
  wapnix-data:
  wapnix-uploads:
